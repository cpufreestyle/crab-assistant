<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🦀 螃蟹助手</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ea580c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0f0f0f;
      --bg-secondary: #1a1a1a;
      --bg-tertiary: #252525;
      --bg-card: #1e1e1e;
      --accent: #ea580c;
      --accent-hover: #f97316;
      --accent-glow: rgba(234, 88, 12, 0.3);
      --text-primary: #f5f5f5;
      --text-secondary: #a3a3a3;
      --text-muted: #6b6b6b;
      --border: #2d2d2d;
      --success: #22c55e;
      --error: #ef4444;
      --sidebar-width: 240px;
      --radius: 12px;
      --radius-lg: 16px;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
    }

    /* ===== 布局 ===== */
    .app {
      display: flex;
      height: 100vh;
    }

    /* ===== 侧边栏 ===== */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: width var(--transition), transform var(--transition);
    }

    .sidebar.collapsed {
      width: 0;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #ea580c, #f97316);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      white-space: nowrap;
    }

    .sidebar-nav {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 12px 16px;
      background: transparent;
      border: none;
      border-radius: var(--radius);
      color: var(--text-secondary);
      font-size: 14px;
      cursor: pointer;
      transition: all var(--transition);
      text-align: left;
    }

    .nav-item:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .nav-item.active {
      background: var(--accent-glow);
      color: var(--accent);
      font-weight: 500;
    }

    .nav-icon { font-size: 18px; }
    .nav-name { white-space: nowrap; }

    .sidebar-footer {
      padding: 12px;
      border-top: 1px solid var(--border);
    }

    /* ===== 主内容区 ===== */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* ===== 顶部栏 ===== */
    .header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-secondary);
    }

    .header-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      font-size: 16px;
    }

    .icon-btn:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* ===== 聊天区域 ===== */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      scroll-behavior: smooth;
    }

    .chat-container {
      max-width: 800px;
      margin: 0 auto;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.8;
    }

    /* ===== 消息 ===== */
    .message {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      animation: msgIn 0.3s ease;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--bg-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .message.assistant .message-avatar {
      background: linear-gradient(135deg, #ea580c, #f97316);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .message-content {
      flex: 1;
      min-width: 0;
    }

    .message-text {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-primary);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message-text code {
      background: var(--bg-tertiary);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
    }

    .message-text pre {
      background: var(--bg-tertiary);
      padding: 16px;
      border-radius: var(--radius);
      overflow-x: auto;
      margin: 12px 0;
    }

    .message-text pre code {
      background: none;
      padding: 0;
    }

    .message-time {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* ===== 输入区域 ===== */
    .input-area {
      padding: 16px 24px 24px;
      border-top: 1px solid var(--border);
      background: var(--bg-secondary);
    }

    .input-wrapper {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .input-box {
      flex: 1;
      position: relative;
    }

    .input-box textarea {
      width: 100%;
      padding: 14px 18px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      color: var(--text-primary);
      font-size: 15px;
      font-family: inherit;
      resize: none;
      min-height: 50px;
      max-height: 150px;
      transition: border-color var(--transition);
    }

    .input-box textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .input-box textarea::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      width: 50px;
      height: 50px;
      border-radius: var(--radius);
      border: none;
      background: var(--accent);
      color: white;
      font-size: 20px;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .send-btn:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: scale(1.05);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ===== 设置面板 ===== */
    .settings-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 400px;
      height: 100vh;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      padding: 24px;
      z-index: 100;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform var(--transition);
    }

    .settings-panel.open {
      transform: translateX(0);
    }

    .settings-panel h2 {
      font-size: 20px;
      margin-bottom: 24px;
      color: var(--text-primary);
    }

    .setting-item {
      margin-bottom: 20px;
    }

    .setting-item label {
      display: block;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .setting-item input,
    .setting-item select {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
    }

    .setting-item input:focus,
    .setting-item select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .save-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      margin-top: 12px;
    }

    .save-btn:hover {
      background: var(--accent-hover);
    }

    /* ===== 记忆宫殿面板 ===== */
    .memory-panel {
      display: none;
      padding: 24px;
    }

    .memory-panel.active {
      display: block;
    }

    .memory-search {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      max-width: 800px;
    }

    .memory-search input {
      flex: 1;
      padding: 12px 16px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-size: 14px;
    }

    .memory-search button {
      padding: 12px 20px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: white;
      cursor: pointer;
      font-weight: 500;
    }

    .memory-results {
      max-width: 800px;
    }

    .memory-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }

    .memory-content {
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 10px;
    }

    .memory-meta {
      display: flex;
      gap: 12px;
      align-items: center;
      font-size: 12px;
      color: var(--text-muted);
    }

    .memory-category {
      background: var(--bg-tertiary);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .memory-use {
      background: var(--accent);
      border: none;
      padding: 4px 12px;
      border-radius: 4px;
      color: white;
      cursor: pointer;
      font-size: 12px;
      margin-left: auto;
    }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 12px 24px;
      border-radius: var(--radius);
      font-size: 14px;
      z-index: 1000;
      animation: toastIn 0.3s ease;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translate(-50%, 20px); }
      to { opacity: 1; transform: translate(-50%, 0); }
    }

    /* ===== 滚动条 ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ===== 响应式 ===== */
    @media (max-width: 768px) {
      .sidebar { position: fixed; z-index: 50; height: 100vh; }
      .sidebar.collapsed { width: 0; }
      .settings-panel { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">🦀 螃蟹助手</div>
      </div>
      <nav class="sidebar-nav" id="sidebarNav">
        <!-- 动态生成 -->
      </nav>
      <div class="sidebar-footer">
        <button class="nav-item" id="settingsBtn">
          <span class="nav-icon">⚙️</span>
          <span class="nav-name">设置</span>
        </button>
        <button class="nav-item" id="clearChatBtn">
          <span class="nav-icon">🗑️</span>
          <span class="nav-name">清空聊天</span>
        </button>
      </div>
    </aside>

    <!-- 主内容 -->
    <main class="main">
      <header class="header">
        <div class="header-title" id="headerTitle">💬 对话</div>
        <div class="header-actions">
          <button class="icon-btn" id="sidebarToggle" title="切换侧边栏">☰</button>
        </div>
      </header>

      <!-- 聊天视图 -->
      <div class="chat-area" id="chatArea">
        <div class="chat-container" id="chatContainer"></div>
      </div>

      <!-- 记忆宫殿视图 -->
      <div class="memory-panel" id="memoryPanel">
        <div class="memory-search">
          <input type="text" id="memorySearchInput" placeholder="搜索记忆...">
          <button onclick="CrabApp.doMemorySearch()">🔍 搜索</button>
        </div>
        <div class="memory-results" id="memoryResults">
          <div class="empty-state">在这里搜索和查看你的记忆</div>
        </div>
      </div>

      <!-- 输入区 -->
      <div class="input-area" id="inputArea">
        <div class="input-wrapper">
          <div class="input-box">
            <textarea id="msgInput" placeholder="输入消息... (Enter发送)" rows="1"></textarea>
          </div>
          <button class="send-btn" id="sendBtn">➤</button>
        </div>
      </div>
    </main>

    <!-- 设置面板 -->
    <div class="settings-panel" id="settingsPanel">
      <h2>⚙️ 设置</h2>
      <!-- 动态内容 -->
    </div>
  </div>

  <script src="config.js"></script>
  <script src="memory.js"></script>
  <script src="skills.js"></script>
  <script>
    // 🚀 启动时自动检测并配置 LM Studio（如果有）
    (async function autoSetupLMStudio() {
      const existing = localStorage.getItem('crab_config');
      if (existing) return; // 用户已配置，跳过

      try {
        const resp = await fetch('http://localhost:1234/v1/models', { signal: AbortSignal.timeout(2000) });
        if (!resp.ok) return;
        const data = await resp.json();
        const models = (data.data || []).map(m => m.id);
        // 跳过纯嵌入模型，选对话模型
        const chatModel = models.find(m =>
          !m.includes('embedding') && !m.includes('embed') && !m.includes('nomic')
        ) || models[0] || '';

        localStorage.setItem('crab_config', JSON.stringify({
          apiKey: '',
          baseUrl: 'http://localhost:1234/v1',
          model: chatModel,
          lmStudioConnected: true,
          lmStudioModels: models.map(id => ({ id, name: id })),
        }));
        console.log('🦎 LM Studio 已自动配置:', chatModel);
      } catch (e) {
        // LM Studio 未运行，不影响正常启动
        console.log('🦀 LM Studio 未检测到，请手动配置API');
      }
    })();
  </script>
  <script src="app.js"></script>
  <script>
    // 注册 Service Worker (PWA)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('🦀 SW 注册成功'))
          .catch(err => console.log('🦀 SW 注册失败:', err));
      });
    }
  </script>
</body>
</html>
